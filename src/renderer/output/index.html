<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIQUID · output</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: crosshair;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #pane {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 330px;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
        z-index: 10;
        border-radius: 8px;
        cursor: default;
        scrollbar-width: thin;
      }
      #pane.hidden {
        display: none;
      }
      #hint {
        position: fixed;
        left: 12px;
        bottom: 10px;
        z-index: 9;
        font: 11px ui-monospace, monospace;
        color: rgba(255, 255, 255, 0.75);
        background: rgba(0, 0, 0, 0.45);
        padding: 4px 10px;
        border-radius: 6px;
        pointer-events: none;
        transition: opacity 1s;
      }
      #hint.faded {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="pane"></div>
    <div id="hint">Tab · panel &nbsp; F · fullscreen &nbsp; Space · pause &nbsp; R · splats &nbsp; C · clear &nbsp; kéo thả nhạc vào đây</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
