# Builds the Windows app WITH working NDI: grandiose compiles natively on the
# windows runner (MSVC + NDI SDK win-x64), which a mac cross-build cannot do.
name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload the installer to (empty = artifact only)'
        default: 'v1.0.0'
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    # windows-latest ships VS 2026 (v18) which older node-gyp can't detect —
    # pin the VS2022 image and force a current node-gyp on top
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # the package's bundled node-gyp 9 needs distutils, removed in Python 3.12
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Point node-gyp at Python 3.11
        shell: bash
        run: echo "npm_config_python=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      # builds grandiose.node for win-x64 and downloads the NDI SDK DLL
      - name: Install dependencies (native build)
        run: npm install

      - name: Verify NDI module loads
        run: node -e "const g = require('@stagetimerio/grandiose'); console.log('grandiose OK:', typeof g.send)"

      # Spout sender addon (SpoutDX/D3D11, vendored SDK) — win-only native module
      - name: Build Spout addon
        working-directory: native/spout
        run: npx node-gyp rebuild

      - name: Verify Spout addon
        shell: bash
        run: ls -la native/spout/build/Release/spout_addon.node

      # --publish never: we upload to the release ourselves below
      - name: Build app
        run: npm run build:win -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: LIQUID-windows-x64
          path: release/*.exe

      - name: Upload to release
        if: github.event.inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" release/*.exe --clobber
